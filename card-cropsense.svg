<svg width="430" height="150" viewBox="0 0 430 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#121826"/>
      <stop offset="100%" stop-color="#0c0f18"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4de8c2" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#4de8c2" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="430" height="150" rx="18" fill="url(#bg)"/>
  <rect x="10" y="10" width="410" height="130" rx="14" fill="url(#glass)" stroke="#4de8c2" stroke-opacity="0.3" filter="url(#shadow)"/>
  <circle cx="34" cy="38" r="5" fill="#4de8c2">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="50" y="43" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700" fill="#eaf1f7">Crop-Sense AI</text>
  <text x="30" y="70" font-family="JetBrains Mono, monospace" font-size="11" fill="#9fb3c8">Multi-source satellite fusion for crop classification,</text>
  <text x="30" y="86" font-family="JetBrains Mono, monospace" font-size="11" fill="#9fb3c8">phenological mapping &amp; moisture-stress detection</text>
  <text x="30" y="115" font-family="JetBrains Mono, monospace" font-size="11" fill="#4de8c2">RF ~65% · LightGBM ~57% · 160 fields</text>
  <rect x="30" y="122" width="90" height="16" rx="8" fill="#4de8c2" opacity="0.14"/>
  <text x="40" y="134" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#4de8c2">IN PROGRESS</text>
</svg>
