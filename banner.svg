<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1420"/>
      <stop offset="50%" stop-color="#161b2e"/>
      <stop offset="100%" stop-color="#0c1018"/>
    </linearGradient>

    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4de8c2" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4de8c2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb454" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffb454" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="glassFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="glassFill2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4de8c2" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#4de8c2" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="glassFill3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb454" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffb454" stop-opacity="0.03"/>
    </linearGradient>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="edgeBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>

  <!-- base -->
  <rect width="900" height="260" fill="url(#bg)"/>

  <!-- ambient glow orbs (depth) -->
  <circle cx="120" cy="60" r="130" fill="url(#glow1)" filter="url(#softBlur)">
    <animate attributeName="cx" values="120;150;120" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="210" r="150" fill="url(#glow2)" filter="url(#softBlur)">
    <animate attributeName="cy" values="210;180;210" dur="11s" repeatCount="indefinite"/>
  </circle>

  <!-- floating glass panels (parallax depth cards) -->
  <g filter="url(#cardShadow)">
    <rect x="600" y="34" width="230" height="70" rx="16" fill="url(#glassFill2)" stroke="#4de8c2" stroke-opacity="0.35" stroke-width="1" filter="url(#edgeBlur)">
      <animate attributeName="y" values="34;24;34" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="618" y="63" font-family="JetBrains Mono, monospace" font-size="12" fill="#4de8c2">
      <animate attributeName="y" values="63;53;63" dur="6s" repeatCount="indefinite"/>
      MULTI-SOURCE FUSION
    </text>
    <text x="618" y="82" font-family="JetBrains Mono, monospace" font-size="11" fill="#9fb3c8">
      <animate attributeName="y" values="82;72;82" dur="6s" repeatCount="indefinite"/>
      Sentinel · Landsat · MODIS
    </text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="655" y="150" width="200" height="66" rx="16" fill="url(#glassFill3)" stroke="#ffb454" stroke-opacity="0.35" stroke-width="1" filter="url(#edgeBlur)">
      <animate attributeName="y" values="150;162;150" dur="7s" repeatCount="indefinite"/>
    </rect>
    <text x="672" y="177" font-family="JetBrains Mono, monospace" font-size="12" fill="#ffb454">
      <animate attributeName="y" values="177;189;177" dur="7s" repeatCount="indefinite"/>
      RF ACCURACY
    </text>
    <text x="672" y="197" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700" fill="#f2f6fa">
      <animate attributeName="y" values="197;209;197" dur="7s" repeatCount="indefinite"/>
      ~65%
    </text>
  </g>

  <!-- main glass panel behind text -->
  <rect x="40" y="60" width="480" height="150" rx="22" fill="url(#glassFill)" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" filter="url(#cardShadow)"/>

  <!-- text content -->
  <text x="68" y="112" font-family="JetBrains Mono, monospace" font-size="30" font-weight="800" fill="#eaf1f7">
    Prince
  </text>
  <text x="68" y="140" font-family="JetBrains Mono, monospace" font-size="14" fill="#4de8c2">
    AI / ML Developer — Satellite Data &amp; Precision Agriculture
  </text>

  <!-- typing cursor line -->
  <text x="68" y="168" font-family="JetBrains Mono, monospace" font-size="13" fill="#9fb3c8">
    <tspan id="typeline">Building Crop-Sense AI for ISRO BAH 2026</tspan>
    <animate attributeName="opacity" values="1;1;0;0;1" dur="3.2s" repeatCount="indefinite"/>
  </text>
  <rect x="68" y="176" width="9" height="15" fill="#4de8c2">
    <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
  </rect>

  <!-- base line accent -->
  <rect x="68" y="192" width="452" height="1" fill="#ffffff" opacity="0.08"/>
  <text x="68" y="205" font-family="JetBrains Mono, monospace" font-size="11" fill="#7d8fa3">
    Bhubaneswar, Odisha · Open to hackathons &amp; remote-sensing collabs
  </text>
</svg>
