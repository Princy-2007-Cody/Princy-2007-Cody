name: Generate Stats Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Switch to output branch (create if missing)
        run: |
          git fetch origin output 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/output; then
            git checkout output
          else
            git checkout --orphan output
            git rm -rf . > /dev/null 2>&1 || true
          fi

      - name: Fetch main stats card
        run: |
          mkdir -p dist
          curl -s "https://github-readme-stats.vercel.app/api?username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=A78BFA&icon_color=8B5CF6&text_color=C4B5FD" -o dist/stats.svg

      - name: Fetch top languages card
        run: |
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=${{ github.repository_owner }}&layout=compact&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=A78BFA&text_color=C4B5FD" -o dist/top-langs.svg

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/stats.svg dist/top-langs.svg
          git commit -m "Update stats cards" || echo "No changes to commit"
          git push origin output
